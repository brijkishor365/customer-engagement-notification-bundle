
services:

    # ── Shared utility ─────────────────────────────────────────────────────────

    CustomerEngagementNotificationBundle\Notification\Resolver\BodyTemplateResolver: ~

    # ── SMS Providers ──────────────────────────────────────────────────────────

    # --- Default HTTP provider (configure once, works with any SMS gateway) ---

    # Provider config value object — one definition per gateway you want to support.
    # Example A: JSON-based gateway (e.g. Infobip, Vonage, THSMS, any REST API)
    cen.sms.config.default:
        #Infobip (JSON)
        $url:           'https://{base-url}.api.infobip.com/sms/2/text/advanced'
        $headers:
            Authorization: 'App %env(INFOBIP_API_KEY)%'
            Content-Type:  'application/json'
        $bodyTemplate:
            messages:
                - from: 'CEP'
                  destinations:
                      - to: '{to}'
                  text: '{message}'
        $bodyFormat:    'json'
        $successHttpCodes: [200]
        $successResponsePath:  'messages.0.status.groupName'
        $successResponseValue: 'PENDING'

