# src/CustomerEngagementNotificationBundle/Resources/config/services.yaml

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            Symfony\Contracts\HttpClient\HttpClientInterface: '@cen.symfony_http_client'

    cen.symfony_http_client:
        class: Symfony\Component\HttpClient\HttpClient
        factory: ['Symfony\Component\HttpClient\HttpClient', 'create']

    # Register all controllers
    Qburst\CustomerEngagementNotificationBundle\Controller\:
        resource: '../../Controller/'
        public: true
        tags: ['controller.service_arguments']

    # ── Utility ────────────────────────────────────────────────────────────────

    Qburst\CustomerEngagementNotificationBundle\Notification\Resolver\BodyTemplateResolver: ~

    # ── Firebase Push ──────────────────────────────────────────────────────────

    Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Push\FirebaseCredentialProvider:
        arguments:
            # env(file:VAR) reads the file at the path stored in the env var
            $serviceAccountJson: '%env(file:FIREBASE_SERVICE_ACCOUNT_PATH)%'

    Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Push\FirebasePushProvider: ~

    Qburst\CustomerEngagementNotificationBundle\Notification\Channel\PushChannel:
        arguments:
            $provider: '@Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Push\FirebasePushProvider'
        tags:
            - { name: cen.notification.channel }

    # ── LINE Messenger ─────────────────────────────────────────────────────────

    Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Line\LineMessengerProvider:
        arguments:
            $channelAccessToken: '%env(LINE_CHANNEL_ACCESS_TOKEN)%'

    Qburst\CustomerEngagementNotificationBundle\Notification\Channel\LineChannel:
        arguments:
            $provider: '@Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Line\LineMessengerProvider'
        tags:
            - { name: cen.notification.channel }

    # ── Pimcore Email ──────────────────────────────────────────────────────────

    Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Email\PimcoreEmailProvider:
        arguments:
            $fromEmail: '%env(MAILER_FROM_EMAIL)%'
            $fromName:  '%env(MAILER_FROM_NAME)%'

    Qburst\CustomerEngagementNotificationBundle\Notification\Channel\EmailChannel:
        arguments:
            $provider: '@Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Email\PimcoreEmailProvider'
        tags:
            - { name: cen.notification.channel }

    # ── SMS (existing, unchanged) ──────────────────────────────────────────────

    cen.sms.config.default:
        class: Qburst\CustomerEngagementNotificationBundle\Notification\Config\HttpSmsProviderConfig
        arguments:
            $url:             '%env(SMS_API_URL)%'
            $method:          'POST'
            $headers:
                Authorization:  'Bearer %env(SMS_API_TOKEN)%'
                Content-Type:   'application/json'
            $bodyTemplate:
                to:      '{to}'
                message: '{message}'
            $bodyFormat:       'json'
            $successHttpCodes: [200, 201]

    Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Sms\HttpSmsProvider:
        arguments:
            $config: '@cen.sms.config.default'

    Qburst\CustomerEngagementNotificationBundle\Notification\Channel\SmsChannel:
        arguments:
            $provider: '@Qburst\CustomerEngagementNotificationBundle\Notification\Provider\Sms\HttpSmsProvider'
        tags:
            - { name: cen.notification.channel }

    # ── WhatsApp ──────────────────────────────────────────────────────────────

    Qburst\CustomerEngagementNotificationBundle\Notification\Provider\WhatsApp\WhatsAppCloudProvider:
        arguments:
            $phoneNumberId: '%env(WHATSAPP_PHONE_NUMBER_ID)%'
            $accessToken: '%env(WHATSAPP_ACCESS_TOKEN)%'

    Qburst\CustomerEngagementNotificationBundle\Notification\Channel\WhatsAppChannel:
        arguments:
            $provider: '@Qburst\CustomerEngagementNotificationBundle\Notification\Provider\WhatsApp\WhatsAppCloudProvider'
        tags:
            - { name: cen.notification.channel }

    # ── Factory + Manager ──────────────────────────────────────────────────────

    Qburst\CustomerEngagementNotificationBundle\Notification\NotificationFactory:
        arguments:
            - '@Psr\Log\LoggerInterface'

    Qburst\CustomerEngagementNotificationBundle\Notification\NotificationManager:
        public: true

    cen.notification_manager:
        alias: Qburst\CustomerEngagementNotificationBundle\Notification\NotificationManager
        public: true